<main class="main">
    <form class="auth-form">
        <h1>SIGN UP</h1>
        <div class="auth-form__group">
            <img src="/assets/icons/userIcon.svg" alt="fullname icon" class="auth-form__icon">
            <input type="text" name="fullname" class="auth-form__input" placeholder="Full Name">
        </div>
        <div class="auth-form__group">
            <img src="/assets/icons/mailIcon.svg" alt="email icon" class="auth-form__icon">
            <input type="text" name="email" class="auth-form__input" placeholder="Email">
        </div>
        <div class="auth-form__group">
            <img src="/assets/icons/lockIcon.svg" alt="password icon" class="auth-form__icon">
            <input type="password" name="password" class="auth-form__input" placeholder="Password">
        </div>
        <button class="auth-form__button" type="submit">Sign up</button>
        <div class="auth-form__footer">Do you have an account? <a routerLink="/signin" class="auth-form__link">Login</a></div>
    </form>
</main>
